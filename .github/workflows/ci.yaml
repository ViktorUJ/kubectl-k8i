name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    name: Check + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Lint + Security + Test + Build all platforms
        uses: docker/build-push-action@ee4ca427a2f43b6a16632044ca514c076267da23 # v6.19.0
        with:
          context: .
          file: Dockerfile.ci
          target: ci
          push: false
          cache-from: type=gha,scope=ci-v3
          cache-to: type=gha,scope=ci-v3,mode=max

      # --- Release (only on push to main, after all checks pass) ---

      - name: Determine next version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="v0.1.0"
          else
            VERSION_NUM="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION_NUM" | cut -d. -f1)
            MINOR=$(echo "$VERSION_NUM" | cut -d. -f2)
            PATCH=$(echo "$VERSION_NUM" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "Latest tag: ${LATEST_TAG:-none}"
          echo "Next version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Setup Go
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}

      - name: Update krew manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          SHA_LINUX_AMD64=$(grep "kubectl-k8i_linux_amd64.tar.gz" dist/checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep "kubectl-k8i_linux_arm64.tar.gz" dist/checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep "kubectl-k8i_darwin_amd64.tar.gz" dist/checksums.txt | awk '{print $1}')
          SHA_DARWIN_ARM64=$(grep "kubectl-k8i_darwin_arm64.tar.gz" dist/checksums.txt | awk '{print $1}')
          SHA_WINDOWS_AMD64=$(grep "kubectl-k8i_windows_amd64.zip" dist/checksums.txt | awk '{print $1}')
          SHA_WINDOWS_ARM64=$(grep "kubectl-k8i_windows_arm64.zip" dist/checksums.txt | awk '{print $1}')

          sed -i "s|version: v.*|version: ${VERSION}|" krew-manifest.yaml
          sed -i "s|releases/download/v[^/]*/|releases/download/${VERSION}/|g" krew-manifest.yaml

          sed -i "/kubectl-k8i_linux_amd64.tar.gz/{n;s|sha256: .*|sha256: \"${SHA_LINUX_AMD64}\"|}" krew-manifest.yaml
          sed -i "/kubectl-k8i_linux_arm64.tar.gz/{n;s|sha256: .*|sha256: \"${SHA_LINUX_ARM64}\"|}" krew-manifest.yaml
          sed -i "/kubectl-k8i_darwin_amd64.tar.gz/{n;s|sha256: .*|sha256: \"${SHA_DARWIN_AMD64}\"|}" krew-manifest.yaml
          sed -i "/kubectl-k8i_darwin_arm64.tar.gz/{n;s|sha256: .*|sha256: \"${SHA_DARWIN_ARM64}\"|}" krew-manifest.yaml
          sed -i "/kubectl-k8i_windows_amd64.zip/{n;s|sha256: .*|sha256: \"${SHA_WINDOWS_AMD64}\"|}" krew-manifest.yaml
          sed -i "/kubectl-k8i_windows_arm64.zip/{n;s|sha256: .*|sha256: \"${SHA_WINDOWS_ARM64}\"|}" krew-manifest.yaml

      - name: Commit krew manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add krew-manifest.yaml
          git diff --cached --quiet || git commit -m "chore: update krew manifest for ${{ steps.version.outputs.version }}"
          git push origin HEAD:main
